select:
  - platform: template
    id: mode_select
    name: "Mode select"
    update_interval: 10s
    options:
      - "MAN"
      - "AUTO"
      - "HOME"
      - "DEMO"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      auto mode = mower->get_mode_text_sensor()->state;
      if (mode == "MAN" || mode == "AUTO" || mode == "HOME" || mode == "DEMO") {
        return mode;
      }
      if (mode == "Charging then AUTO") {
        return std::string("AUTO");
      }
      return {};
    set_action:
      then:
        - lambda: |-
            esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
            mower->set_mode(x);
